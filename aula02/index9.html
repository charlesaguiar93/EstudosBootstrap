    <title>Aprendendo Bootstrap 4.6 no uniSENAI</title>

<body>
    <!-- Mudando a cor
Vamos ver as cores padrão que o bootstrap nos fornece. No caso das cores elas
não são nomeadas por padrão como vermelho, amarelo ou verde. Em vez disso,
eles receberam uma classe que representa um estado. Por exemplo uma cor
vermelha, pode ser um estado de perigo. Dessa maneira, qualquer etiqueta que use
uma classe do tipo cor de perigo ficará vermelha, um texto ou em segundo plano,
vamos ver nos exemplos a seguir:
    -->

   <h1 class="text-primary">Texto azul.</h1>
   <h1 class="text-success">Texto verde.</h1>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    
</body>
</html>
