<!DOCTYPE html>
<html lang="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <title>Aprendendo Bootstrap 4.6 no uniSENAI</title>
</head>
<body>
    <!-- Alinhamento:
Vamos ver as diferentes opções para alinhar a citação em blockquote -->
    
    <blockquote class="blockquote text-center"><br><br>
        <p class="mb-0">
            "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Integer posuere erat a ante."
            <footer class="blockquote-footer">
                Lorem ipsum dolor sit <cite title="amet title">amet.</cite>
            </footer>
        </p>
    
    </blockquote>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
