      <h1 class="">Inscreva-se para a Comunidade de Fãs de Música Eletrônica</h1>
      <form action="#" method="post">
          <label for="nome">Nome completo:</label>
          <input type="text" id="nome" name="nome" required>
  
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required>
  
          <label for="sexo">Sexo:</label>
          <div class="radio-group" id="sexo">
              <label>
                  <input type="radio" name="sexo" value="masculino" required> Masculino
              </label>
              <label>
                  <input type="radio" name="sexo" value="feminino"> Feminino
              </label>
              <label>
                  <input type="radio" name="sexo" value="outro"> Outro
              </label>
              <label>
                  <input type="radio" name="sexo" value="nao-informar"> Prefiro não informar
              </label>
          </div>
  
          <label for="data_nascimento">Data de nascimento:</label>
          <input type="date" id="data_nascimento" name="data_nascimento" required>
  
          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" name="telefone" placeholder="(99) 99999-9999" pattern="^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$" required>
  
          <label for="idade">Idade:</label>
          <input type="number" id="idade" name="idade" min="12" max="120" required>
  
          <label for="genero">Gênero musical favorito:</label>
          <select id="genero" name="genero" required>
              <option value="">Selecione</option>
              <option value="house">House</option>
              <option value="techno">Techno</option>
              <option value="trance">Trance</option>
              <option value="drumandbass">Drum and Bass</option>
              <option value="dubstep">Dubstep</option>
              <option value="outro">Outro</option>
          </select>
  
          <label for="artista">Artista ou DJ favorito:</label>
          <input type="text" id="artista" name="artista">
  
          <label for="mensagem">Por que você gosta de música eletrônica?</label>
          <textarea id="mensagem" name="mensagem" rows="3"></textarea>
  
          <div class="checkbox-group">
              <input type="checkbox" id="fclub" name="fclub">
              <label for="fclub">Desejo participar do fã-clube.</label>
          </div>
  
          <button type="submit">Enviar inscrição</button>
          <button type="reset">Limpar formulário</button>
      </form>
