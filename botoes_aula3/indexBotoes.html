<!DOCTYPE html>
<html lang="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <title>Aprendendo Bootstrap 4.6 no uniSENAI</title>
</head>
<body>
    <!-- Exemplos de botões no bootstrap -->
    <button class="btn btn-primary">botão</button>
    <button class="btn btn-warning">botão</button>
    <button class="btn btn-danger">botão</button>
    
    <!-- Cor que simula um hiperlink ou um link. -->
    <button class="btn btn-link">botão</button>

    <br><br><a class="btn btn-primary" href="#">Nosso link!</a>

    <!-- Botão com contorno - prefixo outline -->

    <br><br><a class="btn btn-outline-primary" href="#">Botão com contorno</a>

    <!-- Botão grande -->
    <br><br><a class="btn btn-primary btn-lg" href="#">Botão grande</a>

    <!-- Botão pequeno -->
    <br><br><a class="btn btn-primary btn-sm" href="#">Botão pequeno</a>
    <!-- Botão block - ocupa toda a largura do container ou tela -->
    <br><br><a class="btn btn-primary btn-block" href="#">Botão block</a>

    
    
    
    
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
