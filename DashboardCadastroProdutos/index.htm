<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" integrity="sha384-UHRtZLI+pbxtHCWp1t77Bi1L4ZtiqrqD80Kn4Z8NTSRyMA2Fd33n5dQ8lWUE00s/" crossorigin="anonymous"></head>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/stely.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">Dashboard</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav"
          aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html"><i class="bi bi-house-check-fill" style="font-size:17px;color:rgb(22, 19, 4);"></i>Home</a>
            </li>
            <li class="nav-item active">
              <a class="nav-link" href="cadastro-produtos.html"><i class="bi bi-bag-check" style="font-size:17px;color:rgb(32, 29, 10);"></i>Cadastro de Produtos</a>
            </li>
          </ul>
          <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown"
                aria-haspopup="true" aria-expanded="false">
                Usuário Logado
                <i class="bi bi-person-fill"></i></a>
              <div class="dropdown-menu dropdown-menu-right bg-dark border-info" aria-labelledby="navbarDropdown">
                
                <a class="dropdown-item text-info" href="#">Perfil</a>
                <a class="dropdown-item text-info" href="#">Sair</a>
              </div>
            </li>
          </ul>
        </div>
      </nav>
    
      <div class="container mb-5  border-info">
        <div class="card card-custom border-info bg-light">
          <div class="card-body">
            <h4 class="card-title"><i class="bi bi-bag-check"></i>Cadastro de Produtos<i class="fas fa-clock" style="font-size:30px;color:green;"></i></h4>
            <form>
              <div class="form-group">
                <label for="productName">Nome do Produto</label>
                <input type="text" class="form-control" id="productName" placeholder="Digite o nome do produto" required>
              </div>
              <div class="form-group">
                <label for="productDescription">Descrição</label>
                <textarea class="form-control" id="productDescription" rows="3" placeholder="Digite a descrição do produto" required></textarea>
              </div>
              <div class="form-group">
                <label for="productPrice">Preço</label>
                <input type="number" class="form-control" id="productPrice" placeholder="Digite o preço do produto" required>
              </div>
              <div class="form-group">
                <label for="productCategory">Categoria</label>
                <select class="form-control" id="productCategory" required>
                  <option>Eletrônicos</option>
                  <option>Roupas</option>
                  <option>Alimentos</option>
                  <option>Móveis</option>
                  <option>Livros</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary bg-secondary border-dark">Salvar</button>
            </form>
          </div>
        </div>
      </div>
</body>
</html>
